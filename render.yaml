services:
  - type: web
    name: yaoh888
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: QUOTE_PROVIDER
        value: finnhub
      - key: QUOTE_REFRESH_SECONDS
        value: "60"
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-flash
      - key: DEEPSEEK_AUTO_INTEL
        value: "false"
      - key: FINNHUB_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
